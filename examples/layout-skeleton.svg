<svg viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Website Design Layout Overview</title>
  <desc>A single-page website design with illustrated characters and generous white space</desc>

  <!-- Background -->
  <rect width="680" height="900" fill="#FFFFFF"/>

  <!-- ====== SECTION 1: HERO (y:0-240) ====== -->
  <rect x="40" y="0" width="600" height="240" fill="none" stroke="#E8E6E0" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Decorative pink circle -->
  <circle cx="520" cy="80" r="70" fill="rgba(250,236,231,0.65)"/>
  <circle cx="100" cy="180" r="50" fill="rgba(230,241,251,0.55)"/>

  <!-- Character 1 placeholder area (right side) -->
  <rect x="380" y="30" width="220" height="170" rx="12" fill="rgba(175,169,236,0.12)" stroke="#AFA9EC" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="490" y="108" text-anchor="middle" fill="#AFA9EC" font-size="13" font-family="system-ui, sans-serif" font-weight="500">AI生成插画</text>
  <text x="490" y="125" text-anchor="middle" fill="#AFA9EC" font-size="10" font-family="system-ui, sans-serif">Character Illustration</text>
  <circle cx="490" cy="80" r="3" fill="#AFA9EC"/>

  <!-- Text content area (left side) -->
  <rect x="60" y="60" width="280" height="120" rx="8" fill="rgba(248,247,245,0.6)" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="72" y="82" fill="#D85A30" font-size="9" font-family="system-ui, sans-serif" font-weight="500" letter-spacing="1.5">CREATIVE STUDIO</text>
  <text x="72" y="108" fill="#1a1a1a" font-size="22" font-family="system-ui, sans-serif" font-weight="300">用创意</text>
  <text x="72" y="133" fill="#1a1a1a" font-size="22" font-family="system-ui, sans-serif" font-weight="600">重新定义</text>
  <text x="72" y="158" fill="#1a1a1a" font-size="22" font-family="system-ui, sans-serif" font-weight="300">数字体验</text>

  <!-- CTA button mock -->
  <rect x="72" y="170" width="110" height="26" rx="13" fill="#1a1a1a"/>
  <text x="127" y="187" text-anchor="middle" fill="#ffffff" font-size="10" font-family="system-ui, sans-serif" font-weight="500">探索作品 →</text>

  <!-- Decorative geometric elements -->
  <circle cx="340" cy="40" r="14" fill="none" stroke="#85B7EB" stroke-width="1.5" opacity="0.5"/>
  <circle cx="630" cy="210" r="20" fill="none" stroke="#F0997B" stroke-width="1.5" opacity="0.4"/>
  <circle cx="40" cy="200" r="10" fill="none" stroke="#AFA9EC" stroke-width="1.5" opacity="0.4"/>

  <!-- Section label -->
  <text x="60" y="232" fill="#b4b2a9" font-size="9" font-family="system-ui, sans-serif" letter-spacing="1.5">HERO — 首屏</text>


  <!-- ====== SECTION 2: ABOUT (y:260-480) ====== -->
  <rect x="40" y="260" width="600" height="220" fill="rgba(230,241,251,0.25)" stroke="#E8E6E0" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Character 2 area (left side) -->
  <rect x="60" y="290" width="200" height="160" rx="12" fill="rgba(133,183,235,0.1)" stroke="#85B7EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="160" y="368" text-anchor="middle" fill="#85B7EB" font-size="13" font-family="system-ui, sans-serif" font-weight="500">SVG插画</text>
  <text x="160" y="385" text-anchor="middle" fill="#85B7EB" font-size="10" font-family="system-ui, sans-serif">Character Illustration</text>
  <circle cx="160" cy="345" r="3" fill="#85B7EB"/>

  <!-- Text content area (right side) -->
  <rect x="290" y="295" width="320" height="150" rx="8" fill="rgba(255,255,255,0.7)" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="302" y="320" fill="#1a1a1a" font-size="18" font-family="system-ui, sans-serif" font-weight="300">关于我们</text>
  <line x1="302" y1="330" x2="380" y2="330" stroke="#F0997B" stroke-width="1.5"/>
  <text x="302" y="352" fill="#6b6b6b" font-size="10" font-family="system-ui, sans-serif">我们相信好的设计不仅仅是视觉上的</text>
  <text x="302" y="366" fill="#6b6b6b" font-size="10" font-family="system-ui, sans-serif">美观，更是对用户需求的深刻理解</text>
  <text x="302" y="380" fill="#6b6b6b" font-size="10" font-family="system-ui, sans-serif">与回应。每一个像素、每一处留白、</text>
  <text x="302" y="394" fill="#6b6b6b" font-size="10" font-family="system-ui, sans-serif">每一种色彩选择，都承载着品质追求。</text>

  <!-- Stats row mock -->
  <text x="302" y="420" fill="#1a1a1a" font-size="16" font-family="system-ui, sans-serif" font-weight="600">126+</text>
  <text x="302" y="434" fill="#6b6b6b" font-size="9" font-family="system-ui, sans-serif">完成项目</text>

  <text x="370" y="420" fill="#1a1a1a" font-size="16" font-family="system-ui, sans-serif" font-weight="600">8年</text>
  <text x="370" y="434" fill="#6b6b6b" font-size="9" font-family="system-ui, sans-serif">行业经验</text>

  <text x="430" y="420" fill="#1a1a1a" font-size="16" font-family="system-ui, sans-serif" font-weight="600">98%</text>
  <text x="430" y="434" fill="#6b6b6b" font-size="9" font-family="system-ui, sans-serif">客户满意度</text>

  <text x="60" y="472" fill="#b4b2a9" font-size="9" font-family="system-ui, sans-serif" letter-spacing="1.5">ABOUT — 关于</text>


  <!-- ====== SECTION 3: PROJECTS (y:500-740) ====== -->
  <rect x="40" y="500" width="600" height="240" fill="none" stroke="#E8E6E0" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Section title -->
  <text x="340" y="530" text-anchor="middle" fill="#1a1a1a" font-size="18" font-family="system-ui, sans-serif" font-weight="300">精选作品</text>
  <text x="340" y="548" text-anchor="middle" fill="#6b6b6b" font-size="10" font-family="system-ui, sans-serif">从品牌策略到交互设计，每一个项目都是全新旅程</text>

  <!-- Project Card 1 -->
  <rect x="60" y="570" width="175" height="140" rx="12" fill="rgba(250,236,231,0.4)" stroke="#F5C4B3" stroke-width="0.8"/>
  <!-- Placeholder box inside -->
  <rect x="72" y="580" width="151" height="78" rx="6" fill="rgba(243,242,240,0.8)" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="147" y="620" text-anchor="middle" fill="#888780" font-size="10" font-family="system-ui, sans-serif">项目图片占位</text>
  <text x="72" y="672" fill="#1a1a1a" font-size="12" font-family="system-ui, sans-serif" font-weight="500">Lumina 品牌重塑</text>
  <text x="72" y="685" fill="#6b6b6b" font-size="8" font-family="system-ui, sans-serif">品牌设计 · VI系统 · 科技</text>

  <!-- Project Card 2 -->
  <rect x="252" y="570" width="175" height="140" rx="12" fill="rgba(230,241,251,0.4)" stroke="#B5D4F4" stroke-width="0.8"/>
  <rect x="264" y="580" width="151" height="78" rx="6" fill="rgba(243,242,240,0.8)" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="339" y="620" text-anchor="middle" fill="#888780" font-size="10" font-family="system-ui, sans-serif">项目图片占位</text>
  <text x="264" y="672" fill="#1a1a1a" font-size="12" font-family="system-ui, sans-serif" font-weight="500">Muse 应用界面设计</text>
  <text x="264" y="685" fill="#6b6b6b" font-size="8" font-family="system-ui, sans-serif">UI/UX · 移动端 · 工具类</text>

  <!-- Project Card 3 -->
  <rect x="444" y="570" width="175" height="140" rx="12" fill="rgba(238,237,254,0.4)" stroke="#CECBF6" stroke-width="0.8"/>
  <rect x="456" y="580" width="151" height="78" rx="6" fill="rgba(243,242,240,0.8)" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="531" y="620" text-anchor="middle" fill="#888780" font-size="10" font-family="system-ui, sans-serif">项目图片占位</text>
  <text x="456" y="672" fill="#1a1a1a" font-size="12" font-family="system-ui, sans-serif" font-weight="500">Aurora 展览网站</text>
  <text x="456" y="685" fill="#6b6b6b" font-size="8" font-family="system-ui, sans-serif">网页设计 · 艺术 · 动效</text>

  <text x="60" y="732" fill="#b4b2a9" font-size="9" font-family="system-ui, sans-serif" letter-spacing="1.5">WORK — 作品</text>


  <!-- ====== SECTION 4: CTA (y:760-840) ====== -->
  <rect x="40" y="760" width="600" height="100" rx="12" fill="rgba(250,236,231,0.35)" stroke="#F5C4B3" stroke-width="0.5"/>

  <!-- Mini character area -->
  <rect x="460" y="775" width="160" height="70" rx="8" fill="rgba(93,202,165,0.1)" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="540" y="818" text-anchor="middle" fill="#5DCAA5" font-size="9" font-family="system-ui, sans-serif">SVG 装饰人物</text>

  <!-- CTA text -->
  <text x="80" y="795" fill="#1a1a1a" font-size="16" font-family="system-ui, sans-serif" font-weight="300">有想法？让我们一起实现它</text>
  <text x="80" y="815" fill="#6b6b6b" font-size="9" font-family="system-ui, sans-serif">期待与你开启下一段创作之旅。</text>
  <rect x="80" y="828" width="100" height="22" rx="11" fill="#1a1a1a"/>
  <text x="130" y="842" text-anchor="middle" fill="#ffffff" font-size="9" font-family="system-ui, sans-serif" font-weight="500">开始合作 →</text>

  <text x="60" y="862" fill="#b4b2a9" font-size="9" font-family="system-ui, sans-serif" letter-spacing="1.5">CONTACT — 联系</text>


  <!-- ====== FOOTER (y:870) ====== -->
  <line x1="40" y1="878" x2="640" y2="878" stroke="#E8E6E0" stroke-width="0.5"/>
  <text x="60" y="894" fill="#888780" font-size="9" font-family="system-ui, sans-serif">© 2026 Atelier Studio. Crafted with care.</text>
  <text x="490" y="894" fill="#888780" font-size="9" font-family="system-ui, sans-serif">Instagram  ·  Behance  ·  Dribbble</text>


  <!-- ====== OVERALL ANNOTATIONS ====== -->
  <!-- White space indicator arrows -->
  <line x1="330" y1="100" x2="370" y2="100" stroke="#D3D1C7" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="370" y1="100" x2="330" y2="100" stroke="#D3D1C7" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text x="350" y="94" text-anchor="middle" fill="#b4b2a9" font-size="8" font-family="system-ui, sans-serif">留白</text>

  <defs>
    <marker id="arrow" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M0 0 L6 3 L0 6 Z" fill="#D3D1C7"/>
    </marker>
  </defs>

</svg>
